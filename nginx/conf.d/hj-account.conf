# =================================================================
# HJ Account AI — nginx site config
#
# Layout: same-origin reverse proxy so the browser bundle uses
# relative /api/... paths (no CORS hassle, no separate api subdomain).
#
# Replace `accounting.example.com` with your real hostname before
# you obtain a TLS cert. To enable HTTPS:
#   1) Get a cert (Let's Encrypt via certbot, or Cloudflare Origin).
#   2) Drop fullchain.pem + privkey.pem into ./nginx/certs/
#   3) Uncomment the 443 server block + the redirect line in 80 block.
# =================================================================

# Cleartext (port 80) — redirect to HTTPS once cert is installed
server {
    listen 80;
    server_name accounting.example.com;

    # Uncomment after TLS is set up:
    # return 301 https://$host$request_uri;

    # For pre-TLS bootstrap, serve directly via HTTP (DO NOT use in prod
    # over the public internet — only on a private VPN/LAN).
    location / {
        proxy_pass http://web:3000;
        include /etc/nginx/conf.d/_proxy.conf;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://api:4000;
        include /etc/nginx/conf.d/_proxy.conf;
    }

    location = /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://api:4000;
        include /etc/nginx/conf.d/_proxy.conf;
    }
}

