# Production deploy stack — single-host self-host behind Nginx Proxy Manager.
#
# Usage:
#   cp .env.production.example .env.production
#   # edit secrets in .env.production
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# First-run only:
#   docker compose -f docker-compose.prod.yml --env-file .env.production exec api \
#     sh -c "pnpm prisma migrate deploy && pnpm prisma db seed"
#
# Reverse proxy + TLS is handled by an EXTERNAL Nginx Proxy Manager (NPM)
# container that already runs on the host. The web + api services here expose
# ports on the host (9930, 9931); point NPM's Proxy Host at those ports.
# See deploy/DEPLOY.md §6 for the NPM configuration steps.
#
# MariaDB is EXTERNAL — set DATABASE_URL in .env.production. Use
# `host.docker.internal` as the hostname so the api container can reach a
# MariaDB that lives on the host (or in another docker network on the host).
# Redis is internal to this stack — BullMQ uses it for the PDF/AI job queues.

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 5
    networks: [hj-net]

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: Asia/Bangkok
      API_PORT: 4000
      # Read raw from .env.production. Hostname `host.docker.internal` resolves
      # to the host gateway thanks to extra_hosts below.
      DATABASE_URL: ${DATABASE_URL}
      # Default to the in-compose redis container; override only if you point
      # at an external Redis.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      WEB_ORIGIN: ${WEB_ORIGIN}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL_EXTRACT: ${OPENROUTER_MODEL_EXTRACT:-anthropic/claude-sonnet-4}
      OPENROUTER_MODEL_CLASSIFY: ${OPENROUTER_MODEL_CLASSIFY:-anthropic/claude-haiku-4}
      OPENROUTER_TIMEOUT_MS: ${OPENROUTER_TIMEOUT_MS:-30000}
      AI_INBOX_DISABLED: ${AI_INBOX_DISABLED:-0}
      ATTACHMENT_DIR: /var/lib/hj-account/attachments
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-20}
      # Path inside the container where pdf-templates/logo.ts will read the
      # company logo PNG from. We mount it as read-only from the host's
      # apps/web/public/logo.png below. Falls back to "SN" text if missing.
      LOGO_PATH: /app/branding/logo.png
    extra_hosts:
      # Lets the api container reach services bound to the host's LAN IP
      # (e.g. an external MariaDB) by the name `host.docker.internal`.
      - "host.docker.internal:host-gateway"
    volumes:
      - attachments:/var/lib/hj-account/attachments
      # Logo for sales-document PDFs. apps/web/public/logo.png is the same
      # file the web app serves; mount it read-only into the api container
      # so PdfTemplateService can base64-inline it.
      - ./apps/web/public/logo.png:/app/branding/logo.png:ro
    ports:
      - "9931:4000"
    networks: [hj-net]

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # Baked into the JS bundle at build time. With NPM proxying the same
        # host name for both / and /api/, leave this EMPTY so the browser uses
        # relative /api/... paths (same-origin, no CORS hassle).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      TZ: Asia/Bangkok
      PORT: 3000
    ports:
      - "9930:3000"
    networks: [hj-net]

  # Daily mariadb-dump → gzip → ./backup/YYYY-MM-DD.sql.gz (retain 14 days).
  # Connects to the EXTERNAL MariaDB via DATABASE_URL — same connection as api.
  backup:
    image: mariadb:11
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TZ: Asia/Bangkok
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backup:/backup
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Backup cron starting (daily at 02:00 Asia/Bangkok)";
        while true; do
          NOW=$$(date +%H%M);
          if [ "$$NOW" = "0200" ]; then
            /usr/local/bin/backup.sh;
            sleep 60;
          fi;
          sleep 30;
        done
    networks: [hj-net]

networks:
  hj-net:
    driver: bridge

volumes:
  redis_data:
  attachments:
