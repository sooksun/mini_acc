# Production deploy stack — single-host self-host behind Nginx Proxy Manager.
#
# Usage:
#   cp .env.production.example .env.production
#   # edit secrets in .env.production
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# First-run only:
#   docker compose -f docker-compose.prod.yml --env-file .env.production exec api \
#     sh -c "pnpm prisma migrate deploy && pnpm prisma db seed"
#
# Reverse proxy + TLS is handled by an EXTERNAL Nginx Proxy Manager (NPM)
# container that already runs on the host. The web + api services here expose
# ports on the host (9930, 9931); point NPM's Proxy Host at those ports.
# See deploy/DEPLOY.md §6 for the NPM configuration steps.
#
# db / redis stay internal (no host port) — only api needs to reach them.

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME:-hjacc}
      MARIADB_USER: ${DB_USER:-hjacc}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Bangkok
    volumes:
      - db_data:/var/lib/mysql
      - ./backup:/backup
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=512M
      - --max-connections=200
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [hj-net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 5
    networks: [hj-net]

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: Asia/Bangkok
      API_PORT: 4000
      DATABASE_URL: mysql://${DB_USER:-hjacc}:${DB_PASSWORD}@db:3306/${DB_NAME:-hjacc}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      WEB_ORIGIN: ${WEB_ORIGIN}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL_EXTRACT: ${OPENROUTER_MODEL_EXTRACT:-anthropic/claude-sonnet-4}
      OPENROUTER_MODEL_CLASSIFY: ${OPENROUTER_MODEL_CLASSIFY:-anthropic/claude-haiku-4}
      OPENROUTER_TIMEOUT_MS: ${OPENROUTER_TIMEOUT_MS:-30000}
      AI_INBOX_DISABLED: ${AI_INBOX_DISABLED:-0}
      ATTACHMENT_DIR: /var/lib/hj-account/attachments
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-20}
    volumes:
      - attachments:/var/lib/hj-account/attachments
    # Bind only to the host loopback for SSH-tunnel debugging if you ever need
    # it, but the canonical access path is through NPM → host port 9931.
    ports:
      - "9931:4000"
    networks: [hj-net]

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # Baked into the JS bundle at build time. With NPM proxying the same
        # host name for both / and /api/, leave this EMPTY so the browser uses
        # relative /api/... paths (same-origin, no CORS hassle).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      TZ: Asia/Bangkok
      PORT: 3000
    ports:
      - "9930:3000"
    networks: [hj-net]

  # Daily mariadb-dump → gzip → ./backup/YYYY-MM-DD.sql.gz
  # Keeps last 14 days.
  backup:
    image: mariadb:11
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-hjacc}
      DB_USER: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: Asia/Bangkok
    volumes:
      - ./backup:/backup
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Backup cron starting (daily at 02:00 Asia/Bangkok)";
        while true; do
          NOW=$$(date +%H%M);
          if [ "$$NOW" = "0200" ]; then
            /usr/local/bin/backup.sh;
            sleep 60;
          fi;
          sleep 30;
        done
    networks: [hj-net]

networks:
  hj-net:
    driver: bridge

volumes:
  db_data:
  redis_data:
  attachments:
