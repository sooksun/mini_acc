# Production deploy stack — single-host self-host
#
# Usage:
#   cp .env.production.example .env.production
#   # edit secrets in .env.production
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# First-run only:
#   docker compose -f docker-compose.prod.yml --env-file .env.production exec api \
#     sh -c "pnpm prisma migrate deploy && pnpm prisma db seed"
#
# All containers attached to network `hj-net`. Only nginx exposes ports to host.
# db / redis / api / web are private — accessed via container-name DNS.

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME:-hjacc}
      MARIADB_USER: ${DB_USER:-hjacc}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Bangkok
    volumes:
      - db_data:/var/lib/mysql
      - ./backup:/backup
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=512M
      - --max-connections=200
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [hj-net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 5
    networks: [hj-net]

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: Asia/Bangkok
      API_PORT: 4000
      DATABASE_URL: mysql://${DB_USER:-hjacc}:${DB_PASSWORD}@db:3306/${DB_NAME:-hjacc}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      WEB_ORIGIN: ${WEB_ORIGIN}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL_EXTRACT: ${OPENROUTER_MODEL_EXTRACT:-anthropic/claude-sonnet-4}
      OPENROUTER_MODEL_CLASSIFY: ${OPENROUTER_MODEL_CLASSIFY:-anthropic/claude-haiku-4}
      ATTACHMENT_DIR: /var/lib/hj-account/attachments
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-20}
    volumes:
      - attachments:/var/lib/hj-account/attachments
    networks: [hj-net]

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # Baked into the JS bundle at build time. For same-origin nginx proxy
        # this should be the empty string so the browser hits /api/... on the
        # same host as the page.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      TZ: Asia/Bangkok
      PORT: 3000
    networks: [hj-net]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_cache:/var/cache/nginx
    networks: [hj-net]

  # Daily mariadb-dump → gzip → ./backup/YYYY-MM-DD.sql.gz
  # Keeps last 14 days.
  backup:
    image: mariadb:11
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-hjacc}
      DB_USER: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: Asia/Bangkok
    volumes:
      - ./backup:/backup
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Backup cron starting (daily at 02:00 Asia/Bangkok)";
        while true; do
          NOW=$$(date +%H%M);
          if [ "$$NOW" = "0200" ]; then
            /usr/local/bin/backup.sh;
            sleep 60;
          fi;
          sleep 30;
        done
    networks: [hj-net]

networks:
  hj-net:
    driver: bridge

volumes:
  db_data:
  redis_data:
  attachments:
  nginx_cache:
